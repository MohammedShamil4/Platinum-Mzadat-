<!DOCTYPE html>
<html>
<head>
<title>Sale Items List</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

h1{
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
    background:#2c3e50;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#eef5ff;
}

.links{
    margin-top:20px;
}

.links a{
    text-decoration:none;
    background:#3498db;
    color:white;
    padding:8px 14px;
    border-radius:4px;
    margin-right:10px;
    display:inline-block;
}

.links a:hover{
    background:#2980b9;
}

</style>

</head>

<body>

<h1>All Sale Items</h1>

<table>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Tax</th>
<th>Multiple Allowed</th>
</tr>

{% for item in items %}
<tr>
<td>{{ item.name }}</td>
<td>{{ item.rate }}</td>
<td>{{ item.tax }}</td>
<td>{{ item.multiple_allowed }}</td>
</tr>
{% empty %}
<tr>
<td colspan="4">No Sale Items added yet.</td>
</tr>
{% endfor %}

</table>

<div class="links">
<p><a href="{% url 'add_saleitem' %}">Add New Sale Item</a></p>
<p><a href="{% url 'create_order' %}">Create Order</a></p>
<p><a href="{% url 'home' %}">Back to Home</a></p>
</div>

</body>
</html>
